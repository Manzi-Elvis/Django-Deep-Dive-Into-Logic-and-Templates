{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<h1>Welcome {{ name }}</h1>

{% if age >= 18 %}
<p>You are an adult.</p>
{% else %}
<p>You are underage.</p>
{% endif %}

<h3>Messages:</h3>

<ul>
    {% for message in messages %}
        <li>{{ message|upper }}</li>
    {% endfor %}
</ul>

{% endblock %}
